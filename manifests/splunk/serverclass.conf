# Splunk deployment server classes for this lab.
# Lives on the indexer at $SPLUNK_HOME/etc/system/local/serverclass.conf

[global]
repositoryLocation = $SPLUNK_HOME/etc/deployment-apps
targetRepositoryLocation = $SPLUNK_HOME/etc/apps
tmpFolder = $SPLUNK_HOME/var/run/tmp

[serverClass:mac_endpoints]
# Match the UF clientName / hostname
whitelist.0 = Stephens-MacBook-Pro-2
whitelist.1 = *MacBook*
whitelist.2 = *macbook*

[serverClass:mac_endpoints:app:TA-add-on-for-apple-unified-logging]
restartSplunkd = true
stateOnClient = enabled

[serverClass:mac_endpoints:app:macos_activity]
restartSplunkd = true
stateOnClient = enabled
