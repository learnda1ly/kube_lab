# Treat each JSONL transcript line as one event.
[cursor:agent_transcript]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 100000

[cursor:log]
SHOULD_LINEMERGE = true
BREAK_ONLY_BEFORE_DATE = true
MAX_TIMESTAMP_LOOKAHEAD = 40

[mac:zsh_history]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
# Extended history: : <epoch>:<duration>;<command>
TIME_PREFIX = ^:\s*
TIME_FORMAT = %s
MAX_TIMESTAMP_LOOKAHEAD = 20

# Override sourcetype by path for the shared projects monitor.
[source::.../agent-transcripts/*.jsonl]
sourcetype = cursor:agent_transcript

[source::.../terminals/*.txt]
sourcetype = cursor:agent_terminal
