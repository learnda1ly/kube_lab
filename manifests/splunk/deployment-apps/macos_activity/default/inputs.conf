# Shell history + Cursor agent/activity logs for this Mac lab UF.
# Deployed via Splunk deployment server (server class mac_endpoints).

[default]
host = Stephens-MacBook-Pro-2

# --- Shell history ---
[monitor:///Users/squinlan/.zsh_history]
disabled = false
index = macos
sourcetype = mac:zsh_history
crcSalt = <SOURCE>

[monitor:///Users/squinlan/.bash_history]
disabled = false
index = macos
sourcetype = mac:bash_history
crcSalt = <SOURCE>

# --- Cursor IDE logs (agent exec, worker, review, main, etc.) ---
[monitor:///Users/squinlan/Library/Application Support/Cursor/logs]
disabled = false
recursive = true
whitelist = \.(log)$
index = macos
sourcetype = cursor:log
crcSalt = <SOURCE>

# --- Cursor project artifacts: agent transcripts + agent terminals ---
[monitor:///Users/squinlan/.cursor/projects]
disabled = false
recursive = true
whitelist = (agent-transcripts/.*\.jsonl$|terminals/.*\.txt$)
index = macos
sourcetype = cursor:project_artifact
crcSalt = <SOURCE>

# --- Cursor prompt history ---
[monitor:///Users/squinlan/.cursor/prompt_history.json]
disabled = false
index = macos
sourcetype = cursor:prompt_history
crcSalt = <SOURCE>
