apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: splunk
  labels:
    app.kubernetes.io/name: splunk
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: splunk
  template:
    metadata:
      labels:
        app.kubernetes.io/name: splunk
    spec:
      securityContext:
        fsGroup: 41812
      containers:
        - name: splunk
          image: splunk/splunk:9.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: hec
              containerPort: 8088
            - name: management
              containerPort: 8089
            - name: s2s
              containerPort: 9997
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_GENERAL_TERMS
              value: "--accept-sgt-current-at-splunk-com"
            - name: SPLUNK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: splunk-secrets
                  key: password
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 3500Mi
          volumeMounts:
            - name: etc
              mountPath: /opt/splunk/etc
            - name: var
              mountPath: /opt/splunk/var
          startupProbe:
            httpGet:
              path: /en-US/account/login
              port: http
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /en-US/account/login
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /en-US/account/login
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            initialDelaySeconds: 60
      volumes:
        - name: etc
          persistentVolumeClaim:
            claimName: splunk-etc
        - name: var
          persistentVolumeClaim:
            claimName: splunk-var
