---
- name: Require NFS export settings from inventory
  ansible.builtin.assert:
    that:
      - nfs_export_path is defined and (nfs_export_path | length > 0)
      - nfs_client_cidr is defined and (nfs_client_cidr | length > 0)
    fail_msg: >-
      nfs_export_path and nfs_client_cidr must come from Terraform-generated
      inventory (nfs group vars).

- name: Install NFS server packages
  ansible.builtin.apt:
    name: "{{ nfs_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create NFS export directory
  ansible.builtin.file:
    path: "{{ nfs_export_path }}"
    state: directory
    owner: root
    group: root
    mode: "0777"

- name: Configure NFS exports
  ansible.builtin.copy:
    dest: /etc/exports
    mode: "0644"
    content: |
      # Managed by Ansible (kube_lab nfs_server role)
      {{ nfs_export_path }} {{ nfs_client_cidr }}({{ nfs_export_options }})
  notify: Reload NFS exports

- name: Enable and start nfs-server
  ansible.builtin.service:
    name: nfs-server
    state: started
    enabled: true
