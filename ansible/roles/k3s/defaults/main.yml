---
k3s_version: "v1.31.4+k3s1"
k3s_install_url: "https://get.k3s.io"
# Canonical server args — Traefik off so you can add your own ingress later.
# Override via inventory group_vars only if you need different flags.
k3s_server_args: >-
  --disable traefik
  --write-kubeconfig-mode 644
k3s_agent_args: ""
k3s_token_path: /var/lib/rancher/k3s/server/node-token
k3s_kubeconfig_path: /etc/rancher/k3s/k3s.yaml
kubeconfig_local_path: "{{ playbook_dir }}/../../kubeconfig"
