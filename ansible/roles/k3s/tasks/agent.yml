---
- name: Require cluster token from control plane
  ansible.builtin.assert:
    that:
      - k3s_cluster_token is defined
      - k3s_cluster_token | length > 0
    fail_msg: "k3s_cluster_token is missing; control plane install must run first."

- name: Resolve control plane address
  ansible.builtin.set_fact:
    k3s_server_url: "https://{{ hostvars[groups['control_plane'][0]].ansible_host }}:6443"

- name: Check whether k3s agent is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s agent
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION="{{ k3s_version }}" K3S_URL="{{ k3s_server_url }}" \
      K3S_TOKEN="{{ k3s_cluster_token }}" sh -s - agent {{ k3s_agent_args }}
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists
  no_log: true

- name: Ensure k3s-agent service is running
  ansible.builtin.service:
    name: k3s-agent
    state: started
    enabled: true