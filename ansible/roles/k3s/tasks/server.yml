---
- name: Check whether k3s server is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Install k3s server
  ansible.builtin.shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server \
      {{ k3s_server_args }}
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  when: not k3s_binary.stat.exists

- name: Ensure k3s service is running
  ansible.builtin.service:
    name: k3s
    state: started
    enabled: true

- name: Wait for node-token
  ansible.builtin.wait_for:
    path: "{{ k3s_token_path }}"
    timeout: 120

- name: Read node-token
  ansible.builtin.slurp:
    src: "{{ k3s_token_path }}"
  register: k3s_token_b64

- name: Set cluster token fact
  ansible.builtin.set_fact:
    k3s_cluster_token: "{{ k3s_token_b64.content | b64decode | trim }}"

- name: Share cluster token with all hosts
  ansible.builtin.set_fact:
    k3s_cluster_token: "{{ k3s_cluster_token }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['k3s_cluster'] }}"

- name: Wait for kubeconfig
  ansible.builtin.wait_for:
    path: "{{ k3s_kubeconfig_path }}"
    timeout: 120

- name: Fetch kubeconfig to controller
  ansible.builtin.fetch:
    src: "{{ k3s_kubeconfig_path }}"
    dest: "{{ kubeconfig_local_path }}"
    flat: true

- name: Rewrite kubeconfig server address for local use
  ansible.builtin.replace:
    path: "{{ kubeconfig_local_path }}"
    regexp: 'https://127\.0\.0\.1:6443'
    replace: "https://{{ ansible_host }}:6443"
  delegate_to: localhost
  become: false