---
# Full cluster bring-up (base OS + k3s).
- name: Prepare all cluster nodes
  hosts: k3s_cluster
  become: true
  roles:
    - role: common

- name: Bootstrap k3s control plane
  hosts: control_plane
  become: true
  serial: 1
  roles:
    - role: k3s

- name: Join k3s workers
  hosts: workers
  become: true
  roles:
    - role: k3s